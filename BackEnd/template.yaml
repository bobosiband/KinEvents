AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: KinEvents backend (AWS SAM)

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 45
    MemorySize: 1024

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
  SendgridApiKey:
    Type: String
    NoEcho: true
  AppUrl:
    Type: String
    Default: https://your-lambda-url.amazonaws.com
  MongoDbUri:
    Type: String
    NoEcho: true
  MongoDbName:
    Type: String
    Default: kinevents

Resources:
  KinEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/lambda.handler
      CodeUri: .lambda-pkg/
      Environment:
        Variables:
          NODE_ENV: production
          JWT_SECRET: !Ref JwtSecret
          SENDGRID_API_KEY: !Ref SendgridApiKey
          APP_URL: !Ref AppUrl
          MONGODB_URI: !Ref MongoDbUri
          MONGODB_DB_NAME: !Ref MongoDbName
      Events:
        ApiProxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"